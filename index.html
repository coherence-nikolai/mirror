<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirror</title>
<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0b0f14;
    color: #e6edf3;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.container {
    width: 90%;
    max-width: 500px;
}
h1 {
    text-align: center;
    margin-bottom: 0;
}
.tagline {
    text-align: center;
    font-size: 0.9em;
    opacity: 0.7;
    margin-bottom: 20px;
}
textarea {
    width: 100%;
    height: 100px;
    background: #11161c;
    border: none;
    color: #e6edf3;
    padding: 10px;
    border-radius: 8px;
}
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #1f6feb;
    color: white;
    font-size: 1em;
}
.output {
    margin-top: 20px;
    padding: 15px;
    background: #11161c;
    border-radius: 8px;
}
.label {
    font-weight: bold;
    opacity: 0.7;
}
</style>
</head>
<body>
<div class="container">
    <h1>Mirror</h1>
    <div class="tagline">See clearly. Shift in one breath.</div>

    <textarea id="input" placeholder="What is here?"></textarea>
    <button onclick="runMirror()">Mirror</button>

    <div class="output" id="output" style="display:none;">
        <div><span class="label">Seen:</span> <span id="pattern"></span></div>
        <div><span class="label">Distortion:</span> <span id="distortion"></span></div>
        <div><span class="label">Shift:</span> <span id="shift"></span></div>
    </div>
</div>

<script>
const patterns = [
    {
        keywords: ["overwhelmed", "behind"],
        pattern: "Compression + time pressure",
        distortion: "Future-based inadequacy",
        shift: "There is only this step."
    },
    {
        keywords: ["anxious", "nervous"],
        pattern: "Anticipatory contraction",
        distortion: "Imagined outcome threat",
        shift: "This is just sensation."
    },
    {
        keywords: ["stuck", "can't"],
        pattern: "Looping inhibition",
        distortion: "Fixed-state belief",
        shift: "Movement is available."
    }
];

function runMirror() {
    const input = document.getElementById("input").value.toLowerCase();
    let result = patterns.find(p => p.keywords.some(k => input.includes(k)));

    if (!result) {
        result = {
            pattern: "Unclear pattern",
            distortion: "Not yet seen",
            shift: "Stay with the breath."
        };
    }

    document.getElementById("pattern").innerText = result.pattern;
    document.getElementById("distortion").innerText = result.distortion;
    document.getElementById("shift").innerText = result.shift;
    document.getElementById("output").style.display = "block";
}
</script>
</body>
</html>
